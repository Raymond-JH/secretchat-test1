<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIV · 프라이빗 채팅</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp, onValue, set, remove, onDisconnect, get }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCaWACYsIpdzP8SvfRyi4wCH-aWAVuzXhQ",
    authDomain:        "secret-ead18.firebaseapp.com",
    databaseURL:       "https://secret-ead18-default-rtdb.firebaseio.com",
    projectId:         "secret-ead18",
    storageBucket:     "secret-ead18.firebasestorage.app",
    messagingSenderId: "664599408152",
    appId:             "1:664599408152:web:dcdcfb87540c60f40bdd6d"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  let myNick = '', roomCode = '', roomName = '', myColor = '', presenceRef;
  let joinedAt = null; // 입장 시각 — 이 이후 메시지만 표시
  const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f43','#48dbfb'];

  function getUserColor(nick) {
    let h = 0;
    for (const c of nick) h = h * 31 + c.charCodeAt(0);
    return COLORS[Math.abs(h) % COLORS.length];
  }
  function genCode() {
    return Math.random().toString(36).substring(2, 7).toUpperCase();
  }
  function nowTime() {
    return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }

  window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(location.search);
    const urlRoom = params.get('room');
    if (urlRoom) {
      document.getElementById('room-code-input').value = urlRoom.toUpperCase();
      showToast(`방 코드 "${urlRoom.toUpperCase()}" 자동 입력됨!`);
    } else {
      const savedCode = localStorage.getItem('priv-last-code');
      if (savedCode) document.getElementById('room-code-input').value = savedCode;
    }
    const savedNick = localStorage.getItem('priv-last-nick');
    if (savedNick) document.getElementById('nickname').value = savedNick;
    const savedRoomName = localStorage.getItem('priv-last-roomname');
    if (savedRoomName) document.getElementById('room-name-input').value = savedRoomName;

    buildEmojiPicker();
  });

  window.randomRoom = () => {
    document.getElementById('room-code-input').value = genCode();
  };

  window.joinRoom = async () => {
    myNick   = document.getElementById('nickname').value.trim();
    roomName = document.getElementById('room-name-input').value.trim() || '프라이빗 채팅';
    roomCode = (document.getElementById('room-code-input').value.trim().toUpperCase()) || genCode();

    if (!myNick) { showToast('닉네임을 입력해주세요!'); return; }

    localStorage.setItem('priv-last-nick', myNick);
    localStorage.setItem('priv-last-code', roomCode);
    localStorage.setItem('priv-last-roomname', roomName);

    myColor = getUserColor(myNick);

    // ── 입장 시각 기록 (이 시각 이후 메시지만 수신) ──
    joinedAt = Date.now();

    document.getElementById('header-room-name').textContent = roomName;
    document.getElementById('header-code').textContent      = roomCode;
    document.getElementById('header-nick').textContent      = myNick;
    const av = document.getElementById('header-avatar');
    av.textContent = myNick.charAt(0).toUpperCase();
    av.style.background = myColor;

    document.getElementById('lobby').style.display    = 'none';
    document.getElementById('chat-app').style.display = 'flex';

    presenceRef = ref(db, `rooms/${roomCode}/members/${myNick}`);
    await set(presenceRef, { nick: myNick, color: myColor, joinedAt: serverTimestamp() });
    onDisconnect(presenceRef).remove();

    onValue(ref(db, `rooms/${roomCode}/members`), snap => {
      const count = snap.exists() ? Object.keys(snap.val()).length : 0;
      document.getElementById('online-count').textContent = count;
    });

    // ── 입장 시각 이후 메시지만 수신 ──
    onChildAdded(ref(db, `rooms/${roomCode}/messages`), snap => {
      const d = snap.val();
      const msgTs = d.ts || 0;
      // 입장 전 메시지는 무시
      if (msgTs < joinedAt) return;
      appendMsg(d.nick, d.text, d.time, d.nick === myNick, d.color);
    });

    await push(ref(db, `rooms/${roomCode}/messages`), {
      nick: '__system__', text: `${myNick}님이 입장했습니다.`,
      time: nowTime(), color: '#888', ts: Date.now()
    });

    addSysMsg(`🔑 방 코드: ${roomCode}`);
    document.getElementById('msg-input').focus();
  };

  window.sendMessage = async () => {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || !roomCode) return;

    await push(ref(db, `rooms/${roomCode}/messages`), {
      nick: myNick, text, time: nowTime(),
      color: myColor, ts: Date.now()
    });

    input.value = '';
    input.style.height = 'auto';
    closeEmoji();
  };

  window.leaveRoom = async () => {
    await push(ref(db, `rooms/${roomCode}/messages`), {
      nick: '__system__', text: `${myNick}님이 나갔습니다.`,
      time: nowTime(), color: '#888', ts: Date.now()
    });
    if (presenceRef) await remove(presenceRef);
    location.reload();
  };

  window.copyCode = () => {
    const url = `${location.origin}${location.pathname}?room=${roomCode}`;
    navigator.clipboard.writeText(url).then(() =>
      showToast('링크 복사됨! 카카오톡에 붙여넣기 하세요 📎')
    );
  };
</script>

<style>
  :root {
    --bg:     #0d0d0d;
    --s1:     #161616;
    --s2:     #1f1f1f;
    --border: #2e2e2e;
    --acc:    #e8ff47;
    --text:   #f0f0f0;
    --dim:    #666;
    --me-bg:  #1a2500;
    --me-bdr: rgba(232,255,71,0.25);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg); color: var(--text);
    height: 100dvh; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  body::after {
    content:''; position:fixed; inset:0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events:none; z-index:999;
  }

  #lobby {
    width: min(440px, 94vw); padding: 44px 36px;
    background: var(--s1); border: 1px solid var(--border);
    border-radius: 24px; animation: rise .45s cubic-bezier(.22,1,.36,1);
  }
  @keyframes rise {
    from { opacity:0; transform:translateY(20px) scale(.98); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  .logo {
    font-family:'Space Mono', monospace; font-size:36px; font-weight:700;
    color:var(--acc); letter-spacing:-2px; line-height:1; margin-bottom:2px;
  }
  .logo span { color:var(--dim); font-weight:400; font-size:14px; letter-spacing:0; margin-left:4px; }
  .tagline { font-size:13px; color:var(--dim); margin-bottom:36px; font-weight:300; }

  .lbl {
    font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2.5px;
    color:var(--dim); text-transform:uppercase; margin-bottom:7px;
  }

  .inp {
    width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px;
    padding:13px 15px; color:var(--text); font-family:'Noto Sans KR',sans-serif;
    font-size:15px; outline:none; transition:border-color .18s, box-shadow .18s; margin-bottom:18px;
  }
  .inp:focus { border-color:var(--acc); box-shadow:0 0 0 3px rgba(232,255,71,.1); }
  .inp::placeholder { color:var(--dim); }

  .hint { font-size:11px; color:var(--dim); margin-top:-14px; margin-bottom:18px; }

  .saved-badge {
    display:inline-block; font-size:10px;
    background:rgba(232,255,71,.1); border:1px solid rgba(232,255,71,.25);
    color:var(--acc); border-radius:5px; padding:2px 7px;
    margin-bottom:16px; font-family:'Space Mono',monospace;
  }

  .btn {
    width:100%; padding:14px; border:none; border-radius:10px;
    font-size:15px; font-weight:700; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; transition:all .18s;
  }
  .btn-p {
    background:var(--acc); color:#0d0d0d; margin-bottom:10px;
    box-shadow:0 4px 20px rgba(232,255,71,.2);
  }
  .btn-p:hover { transform:translateY(-1px); box-shadow:0 6px 28px rgba(232,255,71,.3); }
  .btn-s { background:var(--s2); color:var(--dim); border:1px solid var(--border); }
  .btn-s:hover { border-color:var(--acc); color:var(--acc); }

  #chat-app {
    display:none; flex-direction:column;
    width:100vw; height:100dvh; position:relative; z-index:1;
  }

  .hdr {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px; background:var(--s1);
    border-bottom:1px solid var(--border); flex-shrink:0; gap:12px;
  }
  .hdr-left { display:flex; align-items:center; gap:10px; min-width:0; }
  .live-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--acc); box-shadow:0 0 8px var(--acc); flex-shrink:0;
    animation:blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
  .room-title {
    font-family:'Space Mono',monospace; font-size:14px; font-weight:700;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .code-chip {
    font-family:'Space Mono',monospace; font-size:11px; padding:4px 10px;
    background:rgba(232,255,71,.1); border:1px solid rgba(232,255,71,.25);
    border-radius:6px; color:var(--acc); cursor:pointer; white-space:nowrap;
    transition:background .18s; flex-shrink:0;
  }
  .code-chip:hover { background:rgba(232,255,71,.2); }
  .hdr-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .online { font-size:12px; color:var(--acc); display:flex; align-items:center; gap:5px; font-weight:500; white-space:nowrap; }
  .av {
    width:28px; height:28px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:#0d0d0d; flex-shrink:0;
  }
  .nick-label { font-size:12px; color:var(--dim); white-space:nowrap; }
  .leave-btn {
    background:none; border:1px solid var(--border); border-radius:7px;
    color:var(--dim); font-size:12px; padding:5px 11px;
    cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all .18s; white-space:nowrap;
  }
  .leave-btn:hover { border-color:#ff6b6b; color:#ff6b6b; }

  .msgs {
    flex:1; overflow-y:auto; padding:20px 16px;
    display:flex; flex-direction:column; gap:2px;
  }
  .msgs::-webkit-scrollbar { width:3px; }
  .msgs::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .msg-group { display:flex; flex-direction:column; margin-bottom:10px; }
  .msg-group.me  { align-items:flex-end; }
  .msg-group.oth { align-items:flex-start; }

  .msg-meta { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--dim); margin-bottom:4px; }
  .meta-av {
    width:18px; height:18px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:9px; font-weight:700; color:#0d0d0d; flex-shrink:0;
  }

  .bubble {
    max-width:min(72%, 340px); padding:10px 14px; border-radius:16px;
    font-size:14px; line-height:1.55; word-break:break-word;
    animation:pop .18s ease;
  }
  @keyframes pop { from{opacity:0;transform:scale(.94)} to{opacity:1;transform:scale(1)} }
  .msg-group.me  .bubble { background:var(--me-bg); border:1px solid var(--me-bdr); border-bottom-right-radius:4px; color:#d8f577; }
  .msg-group.oth .bubble { background:var(--s2); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .msg-time { font-size:10px; color:var(--dim); margin-top:4px; font-family:'Space Mono',monospace; }
  .sys { text-align:center; font-size:11px; color:var(--dim); padding:6px; font-style:italic; }

  .input-bar {
    padding:12px 16px; background:var(--s1);
    border-top:1px solid var(--border);
    display:flex; gap:10px; align-items:flex-end; flex-shrink:0;
  }
  .inp-wrap {
    flex:1; background:var(--bg); border:1px solid var(--border);
    border-radius:14px; display:flex; align-items:center;
    padding:4px 8px 4px 14px; gap:8px; transition:border-color .18s, box-shadow .18s;
  }
  .inp-wrap:focus-within { border-color:var(--acc); box-shadow:0 0 0 3px rgba(232,255,71,.08); }
  #msg-input {
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-family:'Noto Sans KR',sans-serif;
    font-size:14px; padding:10px 0; resize:none; max-height:120px;
  }
  #msg-input::placeholder { color:var(--dim); }
  .emo-btn {
    background:none; border:none; font-size:20px;
    cursor:pointer; padding:4px; border-radius:7px;
    transition:background .15s; flex-shrink:0; line-height:1;
  }
  .emo-btn:hover { background:var(--s2); }
  .send {
    width:42px; height:42px; border-radius:12px;
    background:var(--acc); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:all .18s; box-shadow:0 4px 14px rgba(232,255,71,.2);
  }
  .send:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(232,255,71,.3); }
  .send svg { width:17px; height:17px; fill:#0d0d0d; }

  .emo-picker {
    position:absolute; bottom:74px; left:16px;
    background:var(--s1); border:1px solid var(--border);
    border-radius:14px; padding:10px;
    display:none; flex-wrap:wrap; gap:2px;
    width:272px; box-shadow:0 8px 32px rgba(0,0,0,.5); z-index:10;
  }
  .emo-picker.open { display:flex; animation:rise .2s ease; }
  .emo-opt { font-size:22px; cursor:pointer; padding:4px 6px; border-radius:7px; transition:background .12s; line-height:1; }
  .emo-opt:hover { background:var(--s2); }

  .toast {
    position:fixed; top:16px; left:50%;
    transform:translateX(-50%) translateY(-80px);
    background:var(--s2); border:1px solid var(--border);
    border-radius:10px; padding:10px 20px; font-size:13px; z-index:1000;
    transition:transform .3s cubic-bezier(.22,1,.36,1);
    white-space:nowrap; max-width:90vw;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }

  @media (max-width:480px) {
    #lobby { padding:32px 24px; }
    .hdr { padding:12px 14px; }
    .nick-label { display:none; }
    .msgs { padding:16px 10px; }
    .input-bar { padding:10px 12px; }
  }
</style>
</head>
<body>

<div id="lobby">
  <div class="logo">PRIV<span>chat</span></div>
  <div class="tagline">친구들과만 나누는 프라이빗 채팅</div>

  <div id="saved-info"></div>

  <div class="lbl">닉네임</div>
  <input class="inp" id="nickname" placeholder="사용할 닉네임" maxlength="16">

  <div class="lbl">채팅방 이름</div>
  <input class="inp" id="room-name-input" placeholder="우리끼리 / 친목방 …" maxlength="24">

  <div class="lbl">방 코드</div>
  <input class="inp" id="room-code-input" placeholder="없으면 자동 생성됩니다" maxlength="10" style="text-transform:uppercase">
  <div class="hint">입장 후 메시지만 보여요 · 나가면 대화 내용은 사라져요 🔒</div>

  <button class="btn btn-p" onclick="joinRoom()">채팅 시작 →</button>
  <button class="btn btn-s" onclick="randomRoom()">🎲 랜덤 코드 생성</button>
</div>

<div id="chat-app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="live-dot"></div>
      <div class="room-title" id="header-room-name"></div>
      <div class="code-chip" onclick="copyCode()"># <span id="header-code"></span></div>
    </div>
    <div class="hdr-right">
      <div class="online">● <span id="online-count">1</span>명</div>
      <div class="av" id="header-avatar"></div>
      <div class="nick-label" id="header-nick"></div>
      <button class="leave-btn" onclick="leaveRoom()">나가기</button>
    </div>
  </div>

  <div class="msgs" id="messages"></div>
  <div class="emo-picker" id="emoji-picker"></div>

  <div class="input-bar">
    <div class="inp-wrap">
      <button class="emo-btn" onclick="toggleEmoji()">😊</button>
      <textarea id="msg-input" placeholder="메시지 입력…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EMOJIS = ['😊','😂','🥰','😎','🤔','😅','🥺','😭','🔥','💯','👏','🎉','❤️','💜','✨','👀','🙌','💪','🤣','😍','🤩','😴','🤗','😤','🫠','🥳','🫶','👍','🙏','😬','🤫','🫡','💀','🎶','🌟','🎸','🍕','🐱','🐶','🌈','😏','🥹','🙃','😇','🤭','🫢','🤌','💅','🫣','🤪'];

function buildEmojiPicker() {
  document.getElementById('emoji-picker').innerHTML =
    EMOJIS.map(e => `<span class="emo-opt" onclick="insertEmoji('${e}')">${e}</span>`).join('');

  const savedNick = localStorage.getItem('priv-last-nick');
  const savedCode = localStorage.getItem('priv-last-code');
  if (savedNick && savedCode) {
    document.getElementById('saved-info').innerHTML =
      `<div class="saved-badge">💾 마지막 접속: ${savedNick} · #${savedCode}</div>`;
  }
}

function toggleEmoji() { document.getElementById('emoji-picker').classList.toggle('open'); }
function closeEmoji()  { document.getElementById('emoji-picker').classList.remove('open'); }
function insertEmoji(e) {
  const inp = document.getElementById('msg-input');
  const p = inp.selectionStart;
  inp.value = inp.value.slice(0,p) + e + inp.value.slice(p);
  inp.focus(); inp.setSelectionRange(p+e.length, p+e.length);
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function appendMsg(nick, text, time, isMe, color) {
  const wrap = document.getElementById('messages');
  if (nick === '__system__') { addSysMsg(text); return; }
  let group;
  const last = wrap.querySelector('.msg-group:last-child');
  if (last && last.dataset.nick === nick && last.classList.contains(isMe?'me':'oth')) {
    group = last;
  } else {
    group = document.createElement('div');
    group.className = `msg-group ${isMe ? 'me' : 'oth'}`;
    group.dataset.nick = nick;
    if (!isMe) {
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.innerHTML = `<div class="meta-av" style="background:${color}">${nick.charAt(0).toUpperCase()}</div><span>${nick}</span>`;
      group.appendChild(meta);
    }
    wrap.appendChild(group);
  }
  const bub = document.createElement('div');
  bub.className = 'bubble'; bub.textContent = text;
  group.appendChild(bub);
  let tEl = group.querySelector('.msg-time');
  if (!tEl) { tEl = document.createElement('div'); tEl.className='msg-time'; group.appendChild(tEl); }
  tEl.textContent = time;
  wrap.scrollTop = wrap.scrollHeight;
}
function addSysMsg(text) {
  const wrap = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'sys'; el.textContent = text;
  wrap.appendChild(el); wrap.scrollTop = wrap.scrollHeight;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
document.addEventListener('click', e => {
  if (!e.target.closest('.emo-btn') && !e.target.closest('#emoji-picker')) closeEmoji();
});
</script>
</body>
</html>
